name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: 1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
